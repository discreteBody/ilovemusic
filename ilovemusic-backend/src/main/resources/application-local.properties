# Spotify Configuration (optional - for OAuth)
spotify.client.id=${SPOTIFY_CLIENT_ID:}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:}

# Google Configuration (optional - for OAuth)
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}

# YouTube API Key (optional)
youtube.api.key=${YOUTUBE_API_KEY:}

# Email Configuration (Gmail SMTP - for local testing)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_EMAIL:your-email@gmail.com}
spring.mail.password=${GMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@ilovemusic.com

# JWT Secret
jwt.secret=${JWT_SECRET:ilovemusic-jwt-secret-key-2026-at-least-256-bits-minimum-length-required-for-HS256-algorithm-security}

# App URLs
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000

